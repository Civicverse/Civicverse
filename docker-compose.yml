version: "3.9"

services:
  monerod:
    build: ./monerod-stub
    ports:
      - "18081:18081"
      - "18083:18083"
    restart: unless-stopped

  kaspa-node:
    build: ./kaspa-stub
    ports:
      - "16110:16110"
    restart: unless-stopped

  civicverse-backend:
    build: ./backend
    env_file: .env
    depends_on:
      - monerod
    ports:
      - "3001:3001"
    restart: unless-stopped

  multiplayer-server:
    build: ./backend
    working_dir: /app
    command: node multiplayer-server.js
    ports:
      - "8080:8080"
    environment:
      - MULTIPLAYER_PORT=8080
    restart: unless-stopped

  civicverse-frontend:
    build: ./frontend
    env_file: .env
    ports:
      - "3000:80"
    depends_on:
      - multiplayer-server
      - gateway
    environment:
      - VITE_WS_URL=ws://multiplayer-server:8080/ws
      - VITE_API_URL=http://gateway:4001
    restart: unless-stopped

  craig-watcher:
    build: ./craig-v2
    env_file: .env
    depends_on:
      - civicverse-backend
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: civicverse
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  ledger:
    build: ./services/ledger
    environment:
      - POSTGRES_URL=postgres://postgres:postgres@postgres:5432/civicverse
    ports:
      - "4000:4000"
    depends_on:
      - postgres
    restart: unless-stopped

  wallet-router:
    build: ./services/wallet-router
    ports:
      - "5000:5000"
    restart: unless-stopped

  gateway:
    build: ./services/gateway
    environment:
      - LEDGER_URL=http://ledger:4000
      - WALLET_URL=http://wallet-router:5000
    ports:
      - "4001:4001"
    depends_on:
      - ledger
      - wallet-router
    restart: unless-stopped

  tdm-arena:
    build: ./services/tdm-arena
    environment:
      - LEDGER_URL=http://ledger:4000
    ports:
      - "4100:4100"
    depends_on:
      - ledger
    restart: unless-stopped

  ai-copilot:
    build: ./services/ai-copilot
    ports:
      - "4200:4200"
    restart: unless-stopped

  ai-governance-eval:
    build:
      context: ./services/ai-governance-eval
      dockerfile: Dockerfile
    environment:
      - LEDGER_URL=http://ledger:4000
      - SIGNING_MODE=${SIGNING_MODE:-file}
      - SIGNING_KEY_FILE=${SIGNING_KEY_FILE:-/data/signing_key.pem}
      - GOV_SECRET=${GOV_SECRET:-devsecret}
    ports:
      - "4310:4310"
    depends_on:
      - ledger
    volumes:
      - ./services/ai-governance-eval/data:/data:rw
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4310/health"]
      interval: 10s
      retries: 5
    restart: unless-stopped

  ai-governance-local-signer:
    build:
      context: ./services/ai-governance-eval
      dockerfile: Dockerfile
    command: node local-signer.js
    environment:
      - GOV_SECRET=${GOV_SECRET:-devsecret}
      - SIGNING_KEY_FILE=${SIGNING_KEY_FILE:-/data/signing_key.pem}
    ports:
      - "4330:4330"
    depends_on:
      - ai-governance-eval
    volumes:
      - ./services/ai-governance-eval/data:/data:rw
    restart: unless-stopped

  ai-governance-ui-proxy:
    build:
      context: ./services/ai-governance-eval
      dockerfile: Dockerfile
    command: node ui-proxy.js
    environment:
      - GOV_SECRET=${GOV_SECRET:-devsecret}
      - EVAL_URL=http://ai-governance-eval:4310
    ports:
      - "4320:4320"
    depends_on:
      - ai-governance-eval
    volumes:
      - ./ai-governance-protocol/deliverables/ui:/ui:ro
      # do not mount the app directory here (it hides installed node_modules)
    restart: unless-stopped


volumes:
  kaspa-data:
  postgres-data:
