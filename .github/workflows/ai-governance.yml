name: AI Governance CI

on:
  push:
    branches: [ main, ai-governance-protocol ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Run evaluator tests
        working-directory: ./services/ai-governance-eval
        run: |
          node tests/test_evaluator.js
          node tests/test_simulation.js || true
