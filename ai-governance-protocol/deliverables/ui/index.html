<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AI Governance — Attestations Admin</title>
  <style>body{font-family:system-ui,Segoe UI,Roboto,Arial;margin:20px}button{margin:4px}</style>
</head>
<body>
  <div id="debugBanner" style="position:fixed;left:12px;top:12px;padding:8px 12px;background:#222;color:#fff;border-radius:6px;z-index:9999;font-family:system-ui;box-shadow:0 2px 8px rgba(0,0,0,.2)">JS: initializing...</div>
  <script>
    (function(){
      try{
        const b = document.getElementById('debugBanner');
        const set = (s)=>{ if(b) b.textContent = 'JS: '+s; };
        set('loaded-inline');
        window.addEventListener('error', e=> set('error:'+ (e && e.message ? e.message : 'unknown')) );
        window.addEventListener('unhandledrejection', e=> set('unhandled:'+ (e && e.reason && e.reason.message ? e.reason.message : 'rej')) );
        document.addEventListener('DOMContentLoaded', ()=> set('dom-ready') );
        // final marker after a short delay
        setTimeout(()=> set('running'), 500);
      }catch(e){/* ignore */}
    })();
  </script>
  <h2>Attestations</h2>
  <div>
    <label>Ledger URL: <input id="ledgerUrl" value="http://localhost:4000" style="width:320px"/></label>
    <button id="load">Load</button>
    <label style="margin-left:12px">Admin Token: <input id="adminToken" style="width:320px" placeholder="paste admin JWT"/></label>
    <button id="saveToken">Save Token</button>
  </div>
  <pre id="out" style="height:300px;overflow:auto;background:#f8f8f8;padding:10px;border:1px solid #eee"></pre>

  <h3>Human Override</h3>
  <div>
    <label>Human ID: <input id="humanId" value="admin:1"/></label>
    <label>Decision ID: <input id="decisionId"/></label>
    <label>Override Type: <input id="overrideType" value="endorsement"/></label>
    <br/>
    <label>Note: <input id="note" style="width:420px"/></label>
    <button id="override">Send Override</button>
  </div>

  <h3>Escalate</h3>
  <div>
    <label>Reason: <input id="reason" style="width:420px"/></label>
    <button id="escalate">Create Escalation</button>
  </div>

  <h3>Attestation History</h3>
  <div>
    <button id="refreshHistory">Refresh</button>
    <ul id="historyList" style="max-height:240px;overflow:auto;background:#fff;border:1px solid #eee;padding:8px;list-style:none"></ul>
  </div>

  <script src="main.js"></script>
  <script>
    // Client-side logger: forwards console messages and errors to the UI proxy for debugging
    (function(){
      try{
        const send = (level, msg) => {
          try{ navigator.sendBeacon && navigator.sendBeacon('/__client_log', JSON.stringify({ level, msg })); }catch(e){ fetch('/__client_log',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({level,msg})}).catch(()=>{}); }
        };
        const oldLog = console.log; console.log = function(...args){ send('log', args.join(' ')); oldLog.apply(console, args); };
        const oldErr = console.error; console.error = function(...args){ send('error', args.join(' ')); oldErr.apply(console, args); };
        window.addEventListener('error', e=>{ send('error', e.message + ' @' + (e.filename||'') + ':' + (e.lineno||'') ); });
        window.addEventListener('unhandledrejection', e=>{ send('error', 'unhandledrejection: '+ (e.reason && e.reason.message) ); });
        // notify ready
        send('info','client-loaded');
      }catch(e){/* ignore */}
    })();
  </script>
</body>
</html>
